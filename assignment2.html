<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 2 - Student Registration Form</title>
  <link rel="stylesheet" href="input.css">
  <link rel="stylesheet" href="output2.css">
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen text-slate-800">

  <div class="max-w-5xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
        Student Registration Form
      </h1>

      <form class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block font-semibold mb-2">Full Name</label>
          <input type="text" placeholder="Enter your name"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block font-semibold mb-2">Email Address</label>
          <input type="email" placeholder="Enter your email"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block font-semibold mb-2">Phone Number</label>
          <input type="tel" placeholder="Enter mobile number"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block font-semibold mb-2">Date of Birth</label>
          <input type="date"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block font-semibold mb-2">Gender</label>
          <select class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold mb-2">Course</label>
          <select class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option>Select Course</option>
            <option>HTML & CSS</option>
            <option>JavaScript</option>
            <option>React JS</option>
            <option>Full Stack Development</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label class="block font-semibold mb-2">Address</label>
          <textarea rows="4" placeholder="Enter address"
            class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="md:col-span-2 flex gap-4 justify-center">
          <button type="submit"
            class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700">
            Submit
          </button>

          <button type="reset"
            class="bg-slate-700 text-white px-8 py-3 rounded-xl hover:bg-slate-800">
            Reset
          </button>
        </div>
      </form>

      <div class="mt-10 overflow-x-auto">
        <h2 class="text-2xl font-bold mb-4 text-slate-700">Sample Student Table</h2>

        <table class="w-full border border-slate-300 text-left">
          <thead class="bg-blue-600 text-white">
            <tr>
              <th class="p-3 border">ID</th>
              <th class="p-3 border">Name</th>
              <th class="p-3 border">Course</th>
              <th class="p-3 border">Status</th>
            </tr>
          </thead>

          <tbody>
            <tr class="bg-white">
              <td class="p-3 border">101</td>
              <td class="p-3 border">Rahul</td>
              <td class="p-3 border">Web Development</td>
              <td class="p-3 border text-green-600 font-semibold">Registered</td>
            </tr>

            <tr class="bg-slate-50">
              <td class="p-3 border">102</td>
              <td class="p-3 border">Priya</td>
              <td class="p-3 border">JavaScript</td>
              <td class="p-3 border text-green-600 font-semibold">Registered</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</body>
</html>
